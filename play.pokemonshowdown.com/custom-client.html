	<script>
		function linkStyle(url) {
			var linkEl = document.createElement('link');

	<script src="https://play.pokemonshowdown.com/config/config.js?v=2"></script>
	<script>
		if (!window.Config) {
			// offline
			window.Config = {
				version: '0',
				bannedHosts: [],
				whitelist: [],
				routes: {
					root: "pokemonshowdown.com",
					client: "play.pokemonshowdown.com",
					dex: "dex.pokemonshowdown.com",
					replays: "replay.pokemonshowdown.com",
					users: "pokemonshowdown.com/users"
				},
				defaultserver: {
					id: 'showdown',
					host: 'sim3.psim.us',
					port: 443,
					httpport: 8000,
					altport: 80,
					registered: true
				},
				customcolors: {}
			};
		}
		function loadRemoteData(src) {
			var scriptEl = document.createElement('script');
			scriptEl.src = src.replace(/.*\/(data|js)\//g, 'https://play.pokemonshowdown.com/$1/');
			document.head.appendChild(scriptEl);
		}
		Config.testclient = false;
		(function() {
			var match = location.search ? /\?~~(([^:\/]*)(:[0-9]*)?)/.exec(location.search) : null;
			if (match) {
				Config.defaultserver = {
					id: match[1],
					host: match[2],
					port: (match[3] && parseInt(match[3].substr(1))) || 8000
				};
			} else {
				// Automatically connect to the server hosting this client
				var isHttps = location.protocol === 'https:';
				var port = isHttps ? 443 : (location.port || 80);
				Config.defaultserver = {
					id: 'localhost',
					host: location.hostname,
					port: port,
					httpport: port,
					altport: 80,
					protocol: isHttps ? 'https' : 'http',
					registered: true
				};
			}
			Config.server = Config.defaultserver;
			Config.routes = Config.routes || {};
			Config.routes.client = location.hostname;
		})();

		// Fix action.php relative URLs pointing to the local server
		var originalXhrOpen = XMLHttpRequest.prototype.open;
		XMLHttpRequest.prototype.open = function() {
			var args = Array.prototype.slice.call(arguments);
			if (typeof args[1] === 'string' && args[1].includes('/~~localhost/action.php')) {
				args[1] = 'https://play.pokemonshowdown.com/~~localhost/action.php' + (args[1].split('/~~localhost/action.php')[1] || '');
			}
			return originalXhrOpen.apply(this, args);
		};
	</script>
